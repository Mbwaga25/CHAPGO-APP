name: chapgo_app
description: Chapgo — member-owned financial platform for Tanzanian riders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  mobile_scanner: ^3.5.7
  intl: ^0.18.1
  qr_flutter: ^4.1.0
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^13.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/logo.png"

flutter:
  uses-material-design: true
